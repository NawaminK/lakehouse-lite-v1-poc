name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Validate repository structure and Python syntax
        run: |
          python scripts/validate_repo_structure.py

      - name: Run AI Assistant guardrail tests
        env:
          PYTHONPATH: ai-assistant
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m unittest discover -s ai-assistant/tests

      - name: Check shell scripts
        run: |
          find . -name "*.sh" -print -exec bash -n {} \;

      - name: Check required documentation
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f docs/README.md
          test -f docs/team-roadmap.md
          test -f docs/github-workflow.md
          test -f docs/runbooks/startup-shutdown.md
          test -f docs/engineering/definition-of-done.md
