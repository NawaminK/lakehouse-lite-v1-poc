name: lakehouse-lite-v1

services:
  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      lakehouse_net:
        aliases:
          - warehouse.minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mc:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-08-13T08-35-41Z}
    container_name: mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse_net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password;
      mc mb -p local/warehouse;
      mc mb -p local/raw;
      tail -f /dev/null
      "

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.8.1
    container_name: iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
    ports:
      - "8181:8181"
    networks:
      - lakehouse_net

  spark-iceberg:
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    container_name: spark-iceberg
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    ports:
      - "8888:8888"
      - "4040:4040"
      - "10000:10000"
      - "10001:10001"
    volumes:
      - ./spark/jobs:/home/iceberg/jobs
      - ./sample-data:/home/iceberg/sample-data:ro
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
    networks:
      - lakehouse_net

  trino:
    image: trinodb/trino:481
    container_name: trino
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./sql:/tmp/sql:ro
    networks:
      - lakehouse_net

  superset:
    build:
      context: ./superset
    container_name: superset
    depends_on:
      trino:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: change-this-super-secret-key-for-poc-only
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_EMAIL: admin@example.com
    ports:
      - "8088:8088"
    volumes:
      - superset-home:/app/superset_home
    networks:
      - lakehouse_net
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "

  airflow:
    build:
      context: ./airflow
    container_name: airflow
    depends_on:
      spark-iceberg:
        condition: service_started
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scenarios.json:/opt/airflow/scenarios.json:ro
      - airflow-home:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lakehouse_net
    command: >
      bash -c "airflow standalone"

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v3.5.0}
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - lakehouse_net

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-12.1.1}
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - lakehouse_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_IMAGE_TAG:-v0.52.1}
    container_name: cadvisor
    privileged: true
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - lakehouse_net


  ai-assistant:
    build:
      context: ./ai-assistant
      dockerfile: Dockerfile
    container_name: ai-assistant
    profiles:
      - ai
    depends_on:
      trino:
        condition: service_started
    environment:
      TRINO_URI: trino://admin@trino:8080/iceberg/gold
      MAX_ROWS: "200"
    ports:
      - "8010:8010"
    networks:
      - lakehouse_net

networks:
  lakehouse_net:
    driver: bridge

volumes:
  minio-data:
  superset-home:
  airflow-home:
  prometheus-data:
  grafana-data:
